<div class="auth-container">
  <div class="auth-card">
    <h2>{{ isLogin ? 'Најави се' : 'Регистрирај се' }}</h2>

    <form (ngSubmit)="onSubmit()">

      @if (!isLogin) {
        <div class="form-group">
          <label>Име</label>
          <input type="text" [(ngModel)]="name" name="name" placeholder="Внеси име" required />
        </div>
      }

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Внеси email" required />
      </div>

      <div class="form-group">
        <label>Лозинка</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Внеси лозинка" required />
      </div>

      @if (errorMessage) {
        <div class="error">{{ errorMessage }}</div>
      }

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Вчитување...' : (isLogin ? 'Најави се' : 'Регистрирај се') }}
      </button>

    </form>

    <p class="toggle">
      {{ isLogin ? 'Немаш профил?' : 'Веќе имаш профил?' }}
      <span (click)="toggleMode()">{{ isLogin ? 'Регистрирај се' : 'Најави се' }}</span>
    </p>
  </div>
</div>
